<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS파워 | 근골격계 테라피 신청 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root { --gs-blue: #003366; --gs-orange: #FF6600; }
        body { font-family: 'Pretendard', sans-serif; background-color: #FBFBFD; color: #1D1D1F; }
        .apple-card { background: white; border-radius: 22px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        .apple-card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .btn-gs-blue { background-color: var(--gs-blue); color: white; transition: 0.3s; }
        .btn-gs-blue:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-gs-orange { background-color: var(--gs-orange); color: white; transition: 0.3s; }
        .btn-gs-orange:hover { opacity: 0.9; transform: translateY(-1px); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 로그인 배경 (이미지 스타일 반영) */
        .admin-bg { background-color: #003366; display: none; }
    </style>
</head>
<body class="antialiased min-h-screen">

<div id="user-view" class="fade-in">
    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black text-[#003366]">GS</span>
            <span class="text-2xl font-black text-[#FF6600]">POWER</span>
        </div>
        <span class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded-full text-xs font-bold">임직원 모드</span>
    </nav>

    <main class="max-w-6xl mx-auto p-6 lg:p-12">
        <div class="mb-12">
            <h1 class="text-4xl lg:text-5xl font-black tracking-tight mb-4 text-[#1D1D1F]">테라피 프로그램 신청</h1>
            <p class="text-lg text-gray-500 font-medium">서울, 안양, 부천사업소 임직원 누구나 신청 가능합니다.</p>
        </div>

        <div id="user-session-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <footer class="mt-24 text-center pb-12">
            <button onclick="showAdminLogin()" class="text-sm text-gray-300 hover:text-gray-500 transition-colors font-medium">
                관리자 시스템 로그인
            </button>
        </footer>
    </main>
</div>

<div id="admin-login-view" class="admin-bg fixed inset-0 z-50 flex items-center justify-center p-6">
    <div class="bg-[#EBEEF2] p-12 rounded-[40px] shadow-2xl w-full max-w-md text-center fade-in">
        <div class="flex justify-center gap-1 mb-10">
            <span class="text-3xl font-black text-[#003366]">GS</span>
            <span class="text-3xl font-black text-[#FF6600]">POWER</span>
        </div>
        <h2 class="text-3xl font-bold text-[#1D1D1F] mb-3">관리자 인증</h2>
        <p class="text-gray-500 mb-10">근골격계 테라피 프로그램 관리 시스템에 접속합니다.</p>
        
        <input type="password" id="admin-pw" placeholder="비밀번호 입력" 
               class="w-full p-5 bg-white border-none rounded-2xl mb-6 text-center text-lg focus:ring-2 focus:ring-[#003366] outline-none transition-all">
        
        <button onclick="tryAdminAuth()" class="w-full p-5 btn-gs-blue rounded-2xl font-bold text-xl shadow-lg mb-4">접속하기</button>
        <button onclick="hideAdminLogin()" class="text-sm text-gray-400 font-medium hover:text-gray-600">뒤로 가기</button>
        <p id="auth-error" class="text-red-500 mt-4 text-sm hidden font-semibold">비밀번호가 일치하지 않습니다.</p>
    </div>
</div>

<div id="admin-view" class="hidden fade-in min-h-screen bg-gray-50">
    <nav class="bg-white border-b p-6 px-12 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <div class="text-xl font-black text-[#003366]">GS POWER <span class="font-normal text-gray-300 mx-2">|</span> <span class="text-gray-700">관리자 모드</span></div>
        </div>
        <button onclick="location.reload()" class="bg-red-50 text-red-500 px-5 py-2 rounded-xl text-sm font-bold hover:bg-red-100 transition-all">로그아웃</button>
    </nav>

    <main class="max-w-6xl mx-auto p-12">
        <div class="apple-card p-10 mb-12 shadow-sm">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
                <span class="w-1.5 h-6 bg-[#FF6600] rounded-full"></span> 신규 일정 게시
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <select id="new-loc" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#003366]">
                    <option>부천사업소</option><option>서울사업소</option><option>안양사업소</option>
                </select>
                <input type="date" id="new-date" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#003366]">
                <input type="number" id="new-capa" placeholder="정원(명)" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#003366]">
                <button onclick="postSession()" class="btn-gs-blue p-4 rounded-2xl font-bold text-lg">프로그램 공지</button>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-6 text-gray-800">전체 운영 현황</h2>
        <div id="admin-session-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>
</div>

<div id="lottery-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
    <div class="apple-card p-10 w-full max-w-lg text-center bg-white shadow-2xl fade-in">
        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-3xl font-black mb-3 tracking-tight">추첨이 완료되었습니다</h2>
        <div id="lottery-result-content" class="text-gray-600 mb-8 leading-relaxed text-left bg-gray-50 p-6 rounded-2xl border border-gray-100"></div>
        <button onclick="closeModal()" class="w-full p-4 bg-gray-900 text-white rounded-2xl font-bold text-lg hover:bg-black transition-all">결과 확인 완료</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "gspower1234"; // 실제 사용 시 변경하세요!
    let sessions = [
        { id: 1, loc: "안양사업소", date: "2026-05-20", capa: 20, applied: 26, status: "추첨 대기" },
        { id: 2, loc: "부천사업소", date: "2026-05-15", capa: 15, applied: 14, status: "모집 중" }
    ];

    function showAdminLogin() { document.getElementById('admin-login-view').style.display = 'flex'; }
    function hideAdminLogin() { document.getElementById('admin-login-view').style.display = 'none'; }

    function tryAdminAuth() {
        const pw = document.getElementById('admin-pw').value;
        if(pw === ADMIN_PASS) {
            document.getElementById('admin-login-view').style.display = 'none';
            document.getElementById('user-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            renderAdminSessions();
        } else {
            document.getElementById('auth-error').classList.remove('hidden');
        }
    }

    function postSession() {
        const loc = document.getElementById('new-loc').value;
        const date = document.getElementById('new-date').value;
        const capa = parseInt(document.getElementById('new-capa').value);
        if(!date || !capa) return alert("날짜와 정원을 입력해주세요.");
        sessions.unshift({ id: Date.now(), loc, date, capa, applied: 0, status: "모집 중" });
        renderAdminSessions();
    }

    function renderUserSessions() {
        const list = document.getElementById('user-session-list');
        list.innerHTML = '';
        sessions.forEach(s => {
            const progress = Math.min(100, (s.applied / s.capa) * 100);
            const isFull = s.applied >= s.capa;
            list.innerHTML += `
                <div class="apple-card p-8 flex flex-col justify-between shadow-sm border border-gray-50">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="bg-[#003366] text-white px-4 py-1 rounded-full text-xs font-black uppercase">${s.loc}</span>
                            <span class="text-sm font-bold text-gray-400">${s.date}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-8 text-gray-800">테라피 전문가 상담 & 근육 이완 치료</h3>
                        <div class="mb-8">
                            <div class="flex justify-between text-sm font-bold mb-2">
                                <span class="text-gray-400">잔여 인원</span>
                                <span class="${isFull ? 'text-[#FF6600]' : 'text-[#003366]'}">${s.applied} / ${s.capa} 명</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden border border-gray-50">
                                <div class="${isFull ? 'bg-[#FF6600]' : 'bg-[#003366]'} h-full transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                    <button class="w-full ${isFull ? 'bg-gray-100 text-gray-400' : 'btn-gs-blue'} p-4 rounded-2xl font-bold text-lg">${isFull ? '신청 마감' : '지금 신청하기'}</button>
                </div>
            `;
        });
    }

    function renderAdminSessions() {
        const list = document.getElementById('admin-session-list');
        list.innerHTML = '';
        sessions.forEach(s => {
            const isOverflow = s.applied > s.capa;
            let actionBtn = s.status === "완료" ? `<span class="text-gray-400 font-bold p-4 block text-center">결과 공지 완료</span>` :
                          (isOverflow ? `<button onclick="runLottery(${s.id})" class="w-full btn-gs-orange p-4 rounded-2xl font-bold text-lg">추첨 실행</button>` :
                          `<button class="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl font-bold text-lg cursor-not-allowed">모집 대기 중</button>`);

            list.innerHTML += `
                <div class="apple-card p-8 flex flex-col justify-between border-2 ${isOverflow ? 'border-[#FF6600]' : 'border-transparent'}">
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-lg font-bold text-gray-800">${s.loc}</span>
                            <span class="text-xs text-gray-400">${s.date}</span>
                        </div>
                        <div class="text-3xl font-black mb-8 ${isOverflow ? 'text-[#FF6600]' : 'text-[#003366]'}">
                            ${s.applied} <span class="text-gray-300 text-lg font-medium">/ ${s.capa}명</span>
                        </div>
                    </div>
                    <div class="border-t pt-6">${actionBtn}</div>
                </div>
            `;
        });
    }

    function runLottery(id) {
        const s = sessions.find(x => x.id === id);
        const penaltyCount = Math.floor(s.applied * 0.3); // 가상 데이터: 30%가 직전 참여자
        const newCount = s.applied - penaltyCount;
        
        let resultMsg = `<b>대상 사업소:</b> ${s.loc} (${s.date})<br><br>`;
        resultMsg += `<b>총 신청:</b> ${s.applied}명 (정원 ${s.capa}명)<br>`;
        resultMsg += `<b>직전 참여 제외:</b> <span class="text-orange-500 font-bold">${penaltyCount}명</span><br>`;
        resultMsg += `<b>1순위 신청자:</b> <span class="text-blue-600 font-bold">${newCount}명</span><br><br>`;
        
        if(newCount >= s.capa) {
            resultMsg += `공정한 알고리즘에 따라 <b>1순위 대상자 중 무작위로 ${s.capa}명</b>을 선정 완료했습니다.`;
        } else {
            resultMsg += `1순위 신청자 전원을 선발한 후, 부족한 인원만큼 <b>직전 참여자 중 추가 추첨</b>을 진행하여 인원을 채웠습니다.`;
        }

        document.getElementById('lottery-result-content').innerHTML = resultMsg;
        document.getElementById('lottery-modal').style.display = 'flex';
        s.status = "완료";
        renderAdminSessions();
    }

    function closeModal() { document.getElementById('lottery-modal').style.display = 'none'; }

    // 초기 화면 로드
    renderUserSessions();
</script>
</body>
</html>
